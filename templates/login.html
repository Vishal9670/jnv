<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joint NextVenture | Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="{{ url_for('home') }}">
            <span class="brand-mark">JNV</span>
        </a>

        <nav class="nav-links" aria-label="Primary navigation">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('contact') }}">Contact</a>
            <a href="{{ url_for('manager_login') }}">Manager</a>
            <a href="{{ url_for('login') }}">Login</a>
            <a class="nav-button" href="{{ url_for('signup') }}">Sign Up</a>
        </nav>
    </header>

    <main class="auth-shell">
        <section class="auth-panel">
            <p class="eyebrow">Student Access</p>
            <h1>Login</h1>
            {% if error %}
                <p class="form-message error">{{ error }}</p>
            {% endif %}

            <form class="auth-form" action="{{ url_for('login') }}" method="post">
                <label for="email">Email address</label>
                <input id="email" name="email" type="email" placeholder="you@example.com" required>

                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter password" required>

                <button class="primary-button" type="submit">Login</button>
            </form>
            <p class="auth-link">New to Joint NextVenture? <a href="{{ url_for('signup') }}">Create an account</a></p>
        </section>
    </main>
</body>
</html>
